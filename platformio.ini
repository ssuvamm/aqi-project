; AQI Monitor — ESP8266 D1 Mini + PMS5003 + MH-Z19E + 2.4" SPI TFT (no touch)
;
; Build:   pio run                        (default env: ST7789 driver)
; Flash:   pio run -t upload
; Monitor: pio device monitor
;
; The delivered display is the NON-touch variant. Driving it as ILI9341
; produced ignored rotation + an 80px noise band + swapped red/blue —
; the signature of an ST7789V controller, so that's the default env now.
; If a future display really is ILI9341, flash the d1_mini_ili9341 env:
;   pio run -e d1_mini_ili9341 -t upload
;
; TFT_eSPI is configured entirely from build_flags (USER_SETUP_LOADED),
; so no edits inside the library's User_Setup.h are ever needed.
; Sensor UART pins live in include/config.h.

[common]
base_flags =
    -DUSER_SETUP_LOADED=1
    ; SPI bus (fixed hardware SPI pins on ESP8266)
    -DTFT_MISO=12          ; D6 (bus define only - display SDO stays unwired)
    -DTFT_MOSI=13          ; D7
    -DTFT_SCLK=14          ; D5
    ; Control pins
    -DTFT_CS=15            ; D8
    -DTFT_DC=0             ; D3
    -DTFT_RST=-1           ; TFT reset tied to D1 mini RST pin
    ; Fonts
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    ; SPI speed (27 MHz is safe on jumper wires)
    -DSPI_FREQUENCY=27000000
    -DSPI_READ_FREQUENCY=20000000

[env]
platform = espressif8266
board = d1_mini
framework = arduino
monitor_speed = 115200
monitor_filters = esp8266_exception_decoder, default
upload_speed = 460800
upload_port = COM6
lib_deps =
    bodmer/TFT_eSPI@^2.5.43

; ---- default: ST7789 240x320 (matches the delivered non-touch panel) ----
[env:d1_mini]
build_flags =
    ${common.base_flags}
    -DST7789_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    ; Confirmed by photo 2026-07-17: this panel needs inversion OFF and BGR
    ; order (driver defaults produced photo-negative + red/blue swap).
    -DTFT_INVERSION_OFF=1
    -DTFT_RGB_ORDER=TFT_BGR

; ---- fallback: genuine ILI9341 240x320 ----
[env:d1_mini_ili9341]
build_flags =
    ${common.base_flags}
    -DILI9341_DRIVER=1
