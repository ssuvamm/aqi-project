; AQI Monitor — ESP8266 D1 Mini + PMS5003 + MH-Z19E + ILI9341 2.4" SPI touch TFT
;
; Build:   pio run
; Flash:   pio run -t upload
; Monitor: pio device monitor
;
; TFT_eSPI is configured entirely from build_flags below (USER_SETUP_LOADED),
; so no edits inside the library's User_Setup.h are ever needed.
; Sensor UART pins live in include/config.h.

[env:d1_mini]
platform = espressif8266
board = d1_mini
framework = arduino

monitor_speed = 115200
monitor_filters = esp8266_exception_decoder, default
upload_speed = 460800

lib_deps =
    bodmer/TFT_eSPI@^2.5.43

build_flags =
    ; ---- TFT_eSPI configuration (replaces User_Setup.h) ----
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    ; SPI bus (fixed hardware SPI pins on ESP8266)
    -DTFT_MISO=12          ; D6  (shared bus - only touch T_DO is wired to it)
    -DTFT_MOSI=13          ; D7
    -DTFT_SCLK=14          ; D5
    ; Control pins
    -DTFT_CS=15            ; D8
    -DTFT_DC=0             ; D3
    -DTFT_RST=-1           ; TFT reset tied to D1 mini RST pin
    ; XPT2046 resistive touch controller (same SPI bus)
    -DTOUCH_CS=16          ; D0
    ; Fonts
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    ; SPI speeds (27 MHz is the safe maximum for ILI9341 on jumper wires)
    -DSPI_FREQUENCY=27000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
